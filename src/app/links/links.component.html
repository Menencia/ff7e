<div class="uk-margin-top" uk-grid>
  <div class="uk-width-1-1@s uk-width-1-3@m">
      <img src="/assets/covers/ff7e.jpg" alt="" class="uk-thumbnail cover"/>
  </div>
  <div class="uk-width-1-1@s uk-width-2-3@m">

    <h2>Ressources</h2>

    <ul class="list">
      <li *ngFor="let e of links | async">
        <a [href]="e.url" target="_blank">
          <div class="button">{{ e.action }}</div>
          <div class="li-first">
            <span *ngIf="e.lang" class="label lang-en">en anglais</span>
            {{ e.title }}
          </div>
          <div class="li-second">{{ e.desc }}</div>
        </a>
      </li>
    </ul>

  </div>

</div>
